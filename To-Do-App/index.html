<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Professional To-Do App</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="bg1"></div>
  <div class="bg2"></div>

  <div class="container">

    <div class="header">
      <div>
        <h1>TaskFlow</h1>
        <p>Organize your work beautifully</p>
      </div>

      <div class="date-box" id="dateBox"></div>
    </div>

    <div class="task-input-card">

      <input type="text" id="taskInput" placeholder="Enter your task...">

      <div class="grid-inputs">
        <input type="date" id="taskDate">
        <input type="time" id="taskTime">

        <select id="taskPriority">
          <option value="Low">Low Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="High">High Priority</option>
        </select>
      </div>

      <button id="addBtn">+ Add Task</button>

    </div>

    <div class="stats">

      <div class="card">
        <h2 id="totalTasks">0</h2>
        <p>Total Tasks</p>
      </div>

      <div class="card">
        <h2 id="completedTasks">0</h2>
        <p>Completed</p>
      </div>

      <div class="card">
        <h2 id="pendingTasks">0</h2>
        <p>Pending</p>
      </div>

    </div>

    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="completed">Completed</button>
      <button class="filter" data-filter="pending">Pending</button>
    </div>

    <div id="taskList"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
